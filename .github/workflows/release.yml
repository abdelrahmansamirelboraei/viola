name: Release (Multi-Platform)

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  notes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build release notes from CHANGELOG
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          echo "# Release ${TAG}" > RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md

          if [ -f CHANGELOG.md ]; then
            # Try matching "## x.y.z" (without v) or "## vX.Y.Z"
            VER="${TAG#v}"
            awk -v ver="$VER" -v tag="$TAG" '
              BEGIN{found=0}
              $0 ~ "^##[[:space:]]+"ver"([[:space:]]|$)" {found=1}
              $0 ~ "^##[[:space:]]+"tag"([[:space:]]|$)" {found=1}
              found{print}
              found && $0 ~ "^##[[:space:]]+" && $0 !~ "^##[[:space:]]+"ver && $0 !~ "^##[[:space:]]+"tag {exit}
            ' CHANGELOG.md >> RELEASE_NOTES.md

            # If awk found nothing useful, add fallback
            if [ "$(wc -l < RELEASE_NOTES.md)" -le 3 ]; then
              echo "## Notes" >> RELEASE_NOTES.md
              echo "" >> RELEASE_NOTES.md
              echo "- Release built from tag ${TAG}." >> RELEASE_NOTES.md
              echo "- (No matching section found in CHANGELOG.md)" >> RELEASE_NOTES.md
            fi
          else
            echo "## Notes" >> RELEASE_NOTES.md
            echo "" >> RELEASE_NOTES.md
            echo "- Release built from tag ${TAG}." >> RELEASE_NOTES.md
            echo "- (CHANGELOG.md not found)" >> RELEASE_NOTES.md
          fi

      - name: Upload notes artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: RELEASE_NOTES.md

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller

      - name: Build EXE (Windows)
        shell: pwsh
        run: |
          pyinstaller --noconfirm --clean --onefile --name viola `
            --paths ".\viola\src" `
            ".\viola\src\viola\__main__.py"

      - name: Prepare bundle
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $bundle = "viola-$tag-windows"
          New-Item -ItemType Directory -Force $bundle | Out-Null

          Copy-Item ".\dist\viola.exe" $bundle -Force
          if (Test-Path ".\README.md") { Copy-Item ".\README.md" $bundle -Force }
          if (Test-Path ".\CHANGELOG.md") { Copy-Item ".\CHANGELOG.md" $bundle -Force }
          if (Test-Path ".\LICENSE") { Copy-Item ".\LICENSE" $bundle -Force }

          @"
          ## Run (Windows)
          .\viola.exe --text "انا قلقان" --plain
          .\viola.exe --report --days 7
          .\viola.exe --plan --days 7
          .\viola.exe --checkin --mood 60 --note "اختبار"
          "@ | Set-Content -Encoding UTF8 (Join-Path $bundle "RUN.md")

          Compress-Archive -Path $bundle -DestinationPath "$bundle.zip" -Force

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-assets
          path: |
            dist/viola.exe
            viola-${{ github.ref_name }}-windows.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller

      - name: Build (Linux)
        run: |
          pyinstaller --noconfirm --clean --onefile --name viola \
            --paths "./viola/src" \
            "./viola/src/viola/__main__.py"

      - name: Prepare bundle
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          BUNDLE="viola-${TAG}-linux"
          mkdir -p "${BUNDLE}"

          cp "./dist/viola" "${BUNDLE}/viola"
          chmod +x "${BUNDLE}/viola"

          [ -f README.md ] && cp README.md "${BUNDLE}/"
          [ -f CHANGELOG.md ] && cp CHANGELOG.md "${BUNDLE}/"
          [ -f LICENSE ] && cp LICENSE "${BUNDLE}/"

          cat > "${BUNDLE}/RUN.md" << 'EOF'
          ## Run (Linux)
          ./viola --text "انا قلقان" --plain
          ./viola --report --days 7
          ./viola --plan --days 7
          ./viola --checkin --mood 60 --note "اختبار"
          EOF

          zip -r "${BUNDLE}.zip" "${BUNDLE}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-assets
          path: |
            dist/viola
            viola-${{ github.ref_name }}-linux.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller

      - name: Build (macOS)
        run: |
          pyinstaller --noconfirm --clean --onefile --name viola \
            --paths "./viola/src" \
            "./viola/src/viola/__main__.py"

      - name: Prepare bundle
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          BUNDLE="viola-${TAG}-macos"
          mkdir -p "${BUNDLE}"

          cp "./dist/viola" "${BUNDLE}/viola"
          chmod +x "${BUNDLE}/viola"

          [ -f README.md ] && cp README.md "${BUNDLE}/"
          [ -f CHANGELOG.md ] && cp CHANGELOG.md "${BUNDLE}/"
          [ -f LICENSE ] && cp LICENSE "${BUNDLE}/"

          cat > "${BUNDLE}/RUN.md" << 'EOF'
          ## Run (macOS)
          ./viola --text "انا قلقان" --plain
          ./viola --report --days 7
          ./viola --plan --days 7
          ./viola --checkin --mood 60 --note "اختبار"
          EOF

          ditto -c -k --sequesterRsrc --keepParent "${BUNDLE}" "${BUNDLE}.zip"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-assets
          path: |
            dist/viola
            viola-${{ github.ref_name }}-macos.zip

  release:
    needs: [notes, build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: |
          ls -R artifacts

      - name: Create GitHub Release + Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: artifacts/release-notes/RELEASE_NOTES.md
          files: |
            artifacts/windows-assets/viola-${{ github.ref_name }}-windows.zip
            artifacts/windows-assets/dist/viola.exe
            artifacts/linux-assets/viola-${{ github.ref_name }}-linux.zip
            artifacts/linux-assets/dist/viola
            artifacts/macos-assets/viola-${{ github.ref_name }}-macos.zip
            artifacts/macos-assets/dist/viola
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
